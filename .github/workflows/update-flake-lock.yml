name: Update flake.lock

on:
  schedule:
    - cron: "0 3 * * *"  # launch the action every day at 3am
  workflow_dispatch:     # allow manual launch from GitHub

jobs:
  update:
    runs-on: ubuntu-latest
    outputs:
      has-changes: ${{ steps.changes.outputs.changed }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@main

      - name: Update flake.lock
        run: nix flake update

      - name: Check for changes
        id: changes
        run: |
          if git diff --quiet flake.lock; then
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      - name: Create Pull Request
        id: pr
        if: steps.changes.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          branch: update-flake-lock
          title: "chore: update flake.lock"
          body: "Mise à jour automatique du flake.lock"
          base: main

  # Check that flake was correctly update for auto-merge
  validate:
    runs-on: ubuntu-latest
    needs: update
    if: needs.update.outputs.has-changes == 'true'
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: update-flake-lock

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@main

      - name: Validate flake
        run: nix flake check ./ci


  # Auto-merge une fois le check passé
  automerge:
    runs-on: ubuntu-latest
    needs: [ update, validate ]
    if: needs.update.outputs.has-changes == 'true'
    steps:
      - name: Enable auto-merge
        run: gh pr merge update-flake-lock --auto --squash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
